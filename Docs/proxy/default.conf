# ========================================================
# DEFINIÇÃO DOS ALVOS DA REDE INTERNA DOCKER
# ========================================================
upstream site_backend {
    server skyboom_site:80;
}

upstream admin_backend {
    server skyboom_admin:80;
}

upstream api_backend {
    # Motor de processamento PHP-FPM
    server skyboom_api:9000;
}

# ========================================================
# CONFIGURAÇÃO DO SERVIDOR DE BORDA (NGINX PROXY)
# ========================================================
server {
    listen 80;
    server_name _;

    # Cabeçalhos Globais de Segurança (Hardening)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 1. Rota Pública - Interface Principal da SkyBoom
    location / {
        proxy_pass http://site_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Rota Administrativa - Painel de Controle Restrito
    location /admin/ {
        auth_basic "Área Restrita - SkyBoom Corporativo";
        auth_basic_user_file /etc/nginx/.htpasswd;

        fastcgi_pass api_backend;
        include fastcgi_params;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;

        # Repassa APENAS o usuário do .htpasswd para o PHP-FPM
        fastcgi_param PHP_AUTH_USER $remote_user;
    }

    # 3. Rota Backend - API Dinâmica Protegida
    location /api/ {
        auth_basic "API Gatekeeper - Autenticação Requerida";
        auth_basic_user_file /etc/nginx/.htpasswd;

        fastcgi_pass api_backend;
        include fastcgi_params;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;

        # Repassa APENAS o usuário do .htpasswd para o PHP-FPM
        fastcgi_param PHP_AUTH_USER $remote_user;
    }
}
